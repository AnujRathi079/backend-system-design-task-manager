openapi: 3.0.0
info:
  title: Task Management API
  description: API documentation for Task Management System
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Users
  - name: Tasks
  - name: Comments
  - name: Tags

paths:

  /users:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '204':
          description: User created successfully

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      tags: [Tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '204':
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

    patch:
      tags: [Tasks]
      summary: Partially update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated

    delete:
      tags: [Tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Task deleted

  /tasks/{task_id}/comments:
    get:
      tags: [Comments]
      summary: Get comments for a task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'

    post:
      tags: [Comments]
      summary: Add comment to task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
      responses:
        '201':
          description: Comment added

  /tags:
    get:
      tags: [Tags]
      summary: Get all tags
      responses:
        '200':
          description: List of tags

    post:
      tags: [Tags]
      summary: Create a new tag
      responses:
        '201':
          description: Tag created

components:

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        created_at:
          type: string

    UserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password_hash:
          type: string

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        created_by:
          type: integer
        assigned_to:
          type: integer
        due_date:
          type: string

    TaskInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string

    TaskUpdate:
      type: object
      properties:
        status:
          type: string
        priority:
          type: string

    Comment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        comment:
          type: string

    CommentInput:
      type: object
      properties:
        user_id:
          type: integer
        comment:
          type: string